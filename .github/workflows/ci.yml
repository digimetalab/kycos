name: KYCOS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Trigger deployment on version tags like v1.0.2
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Install Playwright Browsers (for OSINT scraping)
      run: npx playwright install chromium --with-deps
      
    - name: Run Vitest Suite
      run: npm test

  publish:
    name: Publish to NPM
    needs: test # Ensure tests pass before publishing
    if: startsWith(github.ref, 'refs/tags/v') # Only run on tag push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Publish Package
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
